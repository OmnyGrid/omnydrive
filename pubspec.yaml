name: omnydrive
description: >-
  Distributed file & git drive synchronization in pure Dart. Publish, mount,
  clone and sync directory and git drives across endpoints coordinated by a
  hub, with explicit conflict detection and an official Dart client SDK.
version: 1.1.0
repository: https://github.com/OmnyGrid/omnydrive

environment:
  sdk: ^3.10.9

dependencies:
  args: ^2.5.0
  crypto: ^3.0.3
  http: ^1.2.0
  path: ^1.9.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4

dev_dependencies:
  dependency_validator: ^5.0.5
  lints: ^6.0.0
  test: ^1.25.6

executables:
  omnydrive: omnydrive
